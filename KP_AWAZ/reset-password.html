<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Set a new KP AWAZ password from a verified recovery session." />
    <title>Set a new password — KP AWAZ</title>
    <link rel="icon" href="assets/images/khyber-voice-mark.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/auth-page.css?v=20260720-recovery-otp" />
    <link rel="stylesheet" href="styles/recovery.css?v=20260720-recovery-otp" />
  </head>
  <body class="access-page recovery-page" data-recovery-state="email">
    <a class="skip-link" href="#passwordRecoveryCard">Skip to password reset</a>
    <main class="access-layout">
      <figure
        class="cultural-hero"
        id="authCulturalHero"
        data-hero-state="loading"
        aria-hidden="true"
      >
        <div class="cultural-hero-fallback" aria-hidden="true"></div>
        <picture>
          <source media="(max-width: 620px)" srcset="assets/auth/kp-awaz-auth-background-mobile.webp" type="image/webp" />
          <source srcset="assets/auth/kp-awaz-auth-background.webp" type="image/webp" />
          <img id="authCulturalHeroImage" src="assets/auth/kp-awaz-auth-background-fallback.jpg" width="1672" height="941" decoding="async" fetchpriority="high" alt="" />
        </picture>
      </figure>
      <div class="access-background-overlay" aria-hidden="true"></div>
      <div class="access-stage" id="authCulturalPanel">
        <div data-partial="sections/password-recovery-card.html"></div>
      </div>
      <aside class="access-cultural-note" aria-label="KP AWAZ community message">
        <span aria-hidden="true">✦</span>
        <p id="authCulturalMessage">Every voice carries a story. Every language carries a community.</p>
      </aside>
    </main>
    <script type="module" src="scripts/reset-password-page.js?v=20260723-auth-config-v2"></script>
  </body>
</html>
