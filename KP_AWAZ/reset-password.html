<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Set a new KP AWAZ password from a verified recovery session." />
    <title>Set a new password — KP AWAZ</title>
    <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/auth-page.css?v=20260717-cultural-auth" />
    <link rel="stylesheet" href="styles/recovery.css?v=20260717-member-workspace" />
  </head>
  <body class="access-page recovery-page" data-recovery-state="loading">
    <a class="skip-link" href="#resetMain">Skip to password reset</a>
    <main class="recovery-layout" id="resetMain">
      <a class="access-brand recovery-brand" href="index.html" aria-label="KP AWAZ home"><img src="assets/images/logo-primary.svg" width="154" height="46" alt="" /></a>
      <section class="recovery-card" aria-labelledby="resetTitle">
        <span class="access-kicker">Verified recovery</span>
        <h1 id="resetTitle">Set a new password.</h1>
        <p id="resetIntro">Checking the secure recovery session…</p>
        <form class="access-form" id="resetPasswordForm" hidden>
          <label for="resetPassword">New password<span class="password-control"><input id="resetPassword" name="password" type="password" autocomplete="new-password" minlength="8" maxlength="72" required /><button id="toggleResetPassword" type="button" aria-label="Show new password" aria-pressed="false">Show</button></span></label>
          <label for="resetPasswordConfirm">Confirm new password<span class="password-control"><input id="resetPasswordConfirm" name="confirmPassword" type="password" autocomplete="new-password" minlength="8" maxlength="72" required /><button id="toggleResetPasswordConfirm" type="button" aria-label="Show confirmed password" aria-pressed="false">Show</button></span></label>
          <p class="field-helper">Use 8–72 characters. Both entries must match.</p>
          <button class="access-primary" id="resetSubmit" type="submit"><span id="resetSubmitLabel">Update password</span><span aria-hidden="true">→</span></button>
        </form>
        <div class="access-message" id="resetMessage" role="status" aria-live="polite" hidden></div>
        <a class="recovery-return" id="newRecoveryLink" href="forgot-password.html" hidden>Request a new recovery email →</a>
      </section>
      <p class="recovery-note">Passwords are handled only by Supabase Auth.</p>
    </main>
    <script type="module" src="scripts/reset-password-page.js?v=20260717-auth-routing"></script>
  </body>
</html>
