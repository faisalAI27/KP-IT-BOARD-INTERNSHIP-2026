<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Request secure KP AWAZ password-reset instructions." />
    <title>Recover your account — KP AWAZ</title>
    <link rel="icon" href="assets/images/logo.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles/auth-page.css?v=20260717-cultural-auth" />
    <link rel="stylesheet" href="styles/recovery.css?v=20260717-member-workspace" />
  </head>
  <body class="access-page recovery-page">
    <a class="skip-link" href="#recoveryMain">Skip to account recovery</a>
    <main class="recovery-layout" id="recoveryMain">
      <a class="access-brand recovery-brand" href="index.html" aria-label="KP AWAZ home"><img src="assets/images/logo.svg" alt="" /><span>KP <strong>AWAZ</strong></span></a>
      <section class="recovery-card" aria-labelledby="recoveryTitle">
        <span class="access-kicker">Account recovery</span>
        <h1 id="recoveryTitle">Find your way back to your voice trail.</h1>
        <p>Enter your email and we will send password-reset instructions when an associated account can receive them.</p>
        <form class="access-form" id="forgotPasswordForm">
          <label for="recoveryEmail">Email address<input id="recoveryEmail" name="email" type="email" autocomplete="email" maxlength="254" required /></label>
          <button class="access-primary" id="recoverySubmit" type="submit"><span id="recoverySubmitLabel">Send reset instructions</span><span aria-hidden="true">→</span></button>
        </form>
        <div class="access-message" id="recoveryMessage" role="status" aria-live="polite" hidden></div>
        <a class="recovery-return" href="auth.html">← Return to sign in</a>
      </section>
      <p class="recovery-note">Our voices, our language, our Khyber Pakhtunkhwa.</p>
    </main>
    <script type="module" src="scripts/forgot-password-page.js?v=20260717-auth-routing"></script>
  </body>
</html>
