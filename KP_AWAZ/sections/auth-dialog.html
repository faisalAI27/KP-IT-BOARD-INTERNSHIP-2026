<dialog
  class="auth-dialog"
  id="authDialog"
  aria-labelledby="authDialogTitle"
  aria-describedby="authDialogDescription"
>
  <div class="auth-dialog-shell">
    <button
      class="auth-dialog-close"
      id="authDialogClose"
      type="button"
      aria-label="Close account dialog"
    >
      <svg viewBox="0 0 20 20" aria-hidden="true">
        <path d="m5 5 10 10M15 5 5 15" />
      </svg>
    </button>

    <span class="auth-kicker">Community account</span>
    <h2 id="authDialogTitle">Sign in to KP AWAZ</h2>
    <p class="auth-dialog-description" id="authDialogDescription">
      Save your place in the community using Google or a secure email link.
    </p>

    <section class="auth-sign-in-view" id="authSignInView">
      <button class="auth-google-button" id="authGoogleButton" type="button">
        <span class="google-mark" aria-hidden="true">G</span>
        <span id="authGoogleButtonLabel">Continue with Google</span>
      </button>

      <div class="auth-divider" aria-hidden="true"><span>or</span></div>

      <form class="auth-email-form" id="authEmailForm" novalidate>
        <label for="authEmailInput">Email address</label>
        <input
          id="authEmailInput"
          name="email"
          type="email"
          inputmode="email"
          autocomplete="email"
          maxlength="254"
          placeholder="you@example.com"
          required
        />
        <button class="btn btn-primary auth-email-submit" id="authEmailSubmit" type="submit">
          <span id="authEmailSubmitLabel">Send sign-in link</span>
        </button>
      </form>

      <p class="auth-privacy-note">
        No password is needed. We will email you a one-time sign-in link.
      </p>
      <div
        class="auth-message"
        id="authSignInStatus"
        role="status"
        aria-live="polite"
        aria-atomic="true"
        hidden
      ></div>
    </section>

    <section class="auth-account-view" id="authAccountView" hidden>
      <div class="auth-account-card">
        <span class="auth-account-avatar" aria-hidden="true">
          <svg viewBox="0 0 24 24">
            <path d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8Zm7 8a7 7 0 0 0-14 0" />
          </svg>
        </span>
        <div class="auth-account-copy">
          <strong id="authAccountEmail">Email not available</strong>
          <span id="authAccountProvider">Verified account</span>
        </div>
      </div>

      <div
        class="auth-message auth-account-message"
        id="authAccountStatus"
        role="status"
        aria-live="polite"
        aria-atomic="true"
        hidden
      ></div>

      <div class="auth-account-actions">
        <button class="btn btn-primary" id="authRetryButton" type="button" hidden>
          <span id="authRetryButtonLabel">Retry verification</span>
        </button>
        <button class="btn btn-quiet" id="authSignOutButton" type="button">
          <span id="authSignOutButtonLabel">Sign out</span>
        </button>
      </div>
    </section>
  </div>
</dialog>
