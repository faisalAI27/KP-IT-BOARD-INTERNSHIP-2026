<button
  class="workspace-menu-button"
  id="workspaceMenuButton"
  type="button"
  aria-controls="workspaceSidebar"
  aria-expanded="false"
>
  <span></span><span></span><span></span>
  <span class="sr-only" id="workspaceMenuLabel">Open workspace menu</span>
</button>

<button
  class="workspace-backdrop"
  id="workspaceBackdrop"
  type="button"
  aria-label="Close workspace menu"
  hidden
></button>

    <a href="dashboard.html" data-workspace-link="overview">

      <span>Dashboard</span>

    <a class="workspace-record-link" href="contribute.html?mode=guided" data-workspace-link="contribute">

      <b aria-hidden="true">→</b>

    <a href="my-contributions.html" data-workspace-link="contributions">

    <span class="workspace-nav-label workspace-nav-label-spaced">More</span>
    <a href="leaderboard.html">

      </svg>
      <span>Leaderboard</span>
    </a>
    <a href="settings.html" data-workspace-link="settings">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="3" /><path d="M19 13.5V10.5l-2-.7-.6-1.4.9-1.9-2.1-2.1-1.9.9-1.4-.6L10.5 3h-3l-.7 2-.9.4M5 8.5l-2 .7v3l2 .7.6 1.4-.9 1.9 2.1 2.1 1.9-.9 1.4.6.7 2h3l.7-2 1.4-.6 1.9.9 2.1-2.1-.9-1.9Z" />

  <div class="workspace-identity">
    <span class="workspace-avatar" id="workspaceUserAvatar" aria-hidden="true">K</span>
    <div>

  <button class="workspace-sign-out" id="workspaceSignOutButton" type="button">
